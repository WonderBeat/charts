apiVersion: v1
kind: Service
metadata:
  name: {{ include "gomodel.fullname" . }}
  labels:
    {{- include "gomodel.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "gomodel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  type: {{ .Values.service.type }}
  ports:
    - protocol: TCP
      name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
