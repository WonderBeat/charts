replicaCount: 1

image:
  repository: enterpilot/gomodel
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    memory: 100Mi

nodeSelector: {}

tolerations: []

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: NotIn
              values:
                - home

persistence:
  enabled: true
  storageClass: local-path
  size: 50Mi
# config: provided via secret.yaml values override
# config: |
#   server:
#     port: "8080"
#     master_key: "..."
#   providers:
#     ...
